apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podinfo-backend
  template:
    metadata:
      labels:
        app: podinfo-backend
    spec:
      containers:
      - name: podinfo
        image: ghcr.io/stefanprodan/podinfo:6.7.0
        ports:
        - containerPort: 9898
        env:
        - name: PODINFO_UI_COLOR
          value: "#4CAF50"
        - name: PODINFO_UI_MESSAGE
          value: "BACKEND - GitOps Demo"
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo-backend
  namespace: default
spec:
  selector:
    app: podinfo-backend
  ports:
  - port: 80
    targetPort: 9898
